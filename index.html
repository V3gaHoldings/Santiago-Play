<style>
:root{--p:#6c5ce7;--s:#00cec9;--a:#fdcb6e;--ok:#00b894;--no:#d63031;--d:#2d3436;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Comic Sans MS','Trebuchet MS',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a23;min-height:100vh;color:var(--d);overflow-x:hidden;}
#stars-bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at top,#3a1c71,#0a0a23 70%);}

@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
.screen{display:none;min-height:100vh;padding:18px;animation:fadeIn .4s;}
.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

@keyframes glow{0%,100%{box-shadow:0 0 12px var(--a)}50%{box-shadow:0 0 30px var(--a),0 0 50px var(--a)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-12px) rotate(6deg)}}

.container{max-width:960px;margin:0 auto;}

h2{color:#fff;text-shadow:0 0 15px rgba(108,92,231,.8);margin:15px 0;text-align:center;}
h3{color:#fff;}
.btn{background:var(--a);border:none;padding:15px 30px;font-size:1.2rem;border-radius:50px;cursor:pointer;font-weight:bold;color:var(--d);box-shadow:0 6px 0 #e1a93a,0 8px 20px rgba(0,0,0,.4);transition:.1s;margin:8px;display:inline-block;}

let state=loadState();
function defaultState(){return{name:"",avatar:"🦸",owned:["🦸","🦸‍♀️","🧙","🥷"],xp:0,coins:0,level:1,streak:1,lastPlay:new Date().toDateString(),progress:{},badges:[],totalCorrect:0,totalWrong:0,playSeconds:0,masteredTopics:[],bestCombo:0,perfectMissions:0,sdWins:0};}
function loadState(){try{const x=JSON.parse(localStorage.getItem("ehq_ult"));if(x){updateStreak(x);return Object.assign(defaultState(),x);}}catch(e){}return defaultState();}
function updateStreak(x){const t=new Date().toDateString();if(x.lastPlay!==t){const d=(new Date(t)-new Date(x.lastPlay))/86400000;if(d===1)x.streak=(x.streak||1)+1;else if(d>1)x.streak=1;x.lastPlay=t;}}
function save(){localStorage.setItem("ehq_ult",JSON.stringify(state));}
setInterval(()=>{state.playSeconds+=15;save();},15000);

function showScreen(id){document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo(0,0);}
function goWelcome(){if(state.name){showScreen("screen-map");renderMap();}else{showScreen("screen-avatar");renderAvatars();}}

let selAva="🦸";
function renderAvatars(){const grid=document.getElementById("avatarGrid");grid.innerHTML="";["🦸","🦸‍♀️","🧙","🥷"].forEach(a=>{const d=document.createElement("div");d.className="avatar-card"+(a===selAva?" selected":"");d.innerHTML=`<div class="emoji">${a}</div>`;d.onclick=()=>{selAva=a;renderAvatars();};grid.appendChild(d);});}
function confirmAvatar(){const n=document.getElementById("playerName").value.trim();if(!n){alert("¡Escribe tu nombre! 😊");return;}state.name=n;state.avatar=selAva;save();showScreen("screen-map");renderMap();}

function hudHTML(){const cur=state.xp-(state.level-1)*100;return`<div class="hud-item"><span class="ic">${state.avatar}</span>${state.name}</div><div class="hud-item"><span class="ic">⭐</span>Nv.${state.level}</div><div class="hud-item"><span class="ic">⚡</span>${state.xp}</div><div class="hud-item"><span class="ic">🪙</span>${state.coins}</div><div class="hud-item"><span class="ic">🔥</span>${state.streak}d</div><div class="xpbar"><div style="width:${Math.min(100,cur)}%"></div></div>`;}
function refreshHUD(){["hud","hud2","hud3"].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML=hudHTML();});}

function worldUnlocked(i){if(i===0)return true;const p=state.progress[GAME_DATA.worlds[i-1].id]||{};return(p.boss||0)>0;}
function worldStars(w){const p=state.progress[w]||{};return Object.values(p).reduce((a,b)=>a+b,0);}
function renderMap(){refreshHUD();const grid=document.getElementById("worldGrid");grid.innerHTML="";GAME_DATA.worlds.forEach((w,i)=>{const u=worldUnlocked(i),st=worldStars(w.id),max=MISSION_TYPES.length*3,pct=Math.round(st/max*100);const d=document.createElement("div");d.className="world-card"+(u?"":" locked");d.style.borderTop="7px solid "+w.color;d.innerHTML=`<div class="num-badge">${i+1}</div>${u?"":'<div class="lock-badge">🔒</div>'}<div class="wemoji">${w.emoji}</div><h3>${w.name}</h3><span class="diff-tag" style="background:${DIFF_COLORS[w.diff]}">${w.level} ${"🔥".repeat(w.diff)}</span><div class="world-stars">${pct===100?"🏆":"⭐"} ${st}/${max}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;d.onclick=u?()=>openWorld(w.id):()=>toast("🔒 ¡Vence el jefe del mundo anterior!");grid.appendChild(d);});}

let curW=null;
function openWorld(id){curW=GAME_DATA.worlds.find(w=>w.id===id);showScreen("screen-missions");renderMissions();}
function missionUnlocked(i){if(i===0)return true;const p=state.progress[curW.id]||{};return(p[MISSION_TYPES[i-1].type]||0)>0;}
function renderMissions(){refreshHUD();document.getElementById("worldTitle").innerHTML=`${curW.emoji} ${curW.name} <span class="diff-tag" style="background:${DIFF_COLORS[curW.diff]}">${curW.level}</span>`;const l=document.getElementById("missionList");l.innerHTML="";const p=state.progress[curW.id]||{};MISSION_TYPES.forEach((m,i)=>{const u=missionUnlocked(i),st=p[m.type]||0;const c=document.createElement("div");c.className="mission-card"+(st>0?" done":"")+(u?"":" locked");c.innerHTML=`<div class="mission-icon">${m.icon}</div><div class="mission-info"><h4>${m.title}</h4><p>${m.desc}</p></div><div class="world-stars">${st>0?"⭐".repeat(st):(u?"▶️":"🔒")}</div>`;c.onclick=u?()=>startMission(m.type):()=>toast("🔒 ¡Completa la misión anterior!");l.appendChild(c);});}

let actM=null,combo=0;
function startMission(t){actM=t;combo=0;showScreen("screen-game");refreshHUD();const m=MISSION_TYPES.find(x=>x.type===t);document.getElementById("gameTitle").textContent=`${m.icon} ${m.title}`;({learn:gLearn,memory:gMemory,quiz:gQuiz,hunt:gHunt,speak:gSpeak,listen:gListen,grammar:gGrammar,build:gBuild,boss:gBoss})[t]();}
function quitGame(){clearInterval(qTimer);showScreen("screen-missions");renderMissions();}

/* adaptive: tiempo según dificultad y precisión histórica */
function adaptiveTime(base){const tot=state.totalCorrect+state.totalWrong;const acc=tot?state.totalCorrect/tot:0.7;let t=base-curW.diff;if(acc>0.85)t-=1;if(acc<0.5)t+=2;return Math.max(3,t);}

/* 1.LEARN */
let lI=0;
function gLearn(){lI=0;showLearn();}
function showLearn(){const x=curW.vocab[lI];document.getElementById("gameBox").innerHTML=`<div class="emoji-big">${x.emoji}</div><div class="question">${x.en}</div><p style="text-align:center;font-size:1.2rem;color:#636e72">= ${x.es}</p><div style="text-align:center"><button class="speak-btn" onclick="speak('${x.en.replace(/'/g,"")}')">🔊</button></div><p style="text-align:center;color:#999">${lI+1}/${curW.vocab.length}</p><button class="btn btn-p btn-block" onclick="nLearn()">${lI<curW.vocab.length-1?"Siguiente ➡️":"¡Terminar! ✅"}</button>`;speak(x.en);}
function nLearn(){lI++;if(lI>=curW.vocab.length)finish("learn",3,30,15);else showLearn();}

/* 2.MEMORY */
let mF=[],mM=0,mL=false,mT=0;
function gMemory(){const n=curW.diff>=3?8:6;const voc=shuf([...curW.vocab]).slice(0,n);mT=n;let cards=[];voc.forEach(x=>{cards.push({k:x.en,d:x.en});cards.push({k:x.en,d:x.emoji});});cards=shuf(cards);mF=[];mM=0;mL=false;document.getElementById("gameBox").innerHTML=`<div id="feedback">Empareja palabra-dibujo 🃏</div><div class="memory-grid" style="grid-template-columns:repeat(4,1fr)" id="mg"></div>`;const grid=document.getElementById("mg");cards.forEach(c=>{const e=document.createElement("div");e.className="mem-card";e.textContent="?";e.onclick=()=>flip(e,c);grid.appendChild(e);});}
function flip(el,c){if(mL||el.classList.contains("flipped")||el.classList.contains("matched"))return;el.classList.add("flipped");el.textContent=c.d;mF.push({el,c});if(mF.length===2){mL=true;const[a,b]=mF;if(a.c.k===b.c.k){setTimeout(()=>{a.el.classList.add("matched");b.el.classList.add("matched");mM++;sfx(true);document.getElementById("feedback").textContent="¡Bien! 🎉";mF=[];mL=false;if(mM===mT)finish("memory",3,45,22);},400);}else{sfx(false);setTimeout(()=>{a.el.classList.remove("flipped");b.el.classList.remove("flipped");a.el.textContent="?";b.el.textContent="?";mF=[];mL=false;},800);}}}

/* 3.QUIZ */
let qI=0,qS=0,qQ=[],qTimer,qLim;
function gQuiz(){const n=curW.diff>=3?6:5;qQ=shuf([...curW.vocab]).slice(0,n).map(x=>{const w=shuf(curW.vocab.filter(y=>y.en!==x.en)).slice(0,3).map(y=>y.es);return{emoji:x.emoji,en:x.en,a:x.es,opts:shuf([x.es,...w])};});qI=0;qS=0;showQ();}
function showQ(){const q=qQ[qI];qLim=adaptiveTime(9);document.getElementById("gameBox").innerHTML=`<div class="health-bar">⚡ ${qI+1}/${qQ.length}</div><div class="timer-bar"><div class="timer-fill" id="tf" style="width:100%"></div></div><div class="combo-tag" id="ct">${combo>1?"🔥 Combo x"+combo:""}</div><div class="emoji-big">${q.emoji}</div><div class="question">"${q.en}" en español?</div><div id="feedback"></div><div class="options" id="op"></div>`;const o=document.getElementById("op");q.opts.forEach(opt=>{const b=document.createElement("button");b.className="option";b.textContent=opt;b.onclick=()=>aQ(b,opt,q.a);o.appendChild(b);});speak(q.en);clearInterval(qTimer);const st=Date.now();qTimer=setInterval(()=>{const e=(Date.now()-st)/1000,left=Math.max(0,qLim-e);document.getElementById("tf").style.width=(left/qLim*100)+"%";if(left<=0){clearInterval(qTimer);toQ(q.a);}},80);}
function toQ(ans){document.querySelectorAll("#op .option").forEach(b=>{b.disabled=true;if(b.textContent===ans)b.classList.add("correct");});combo=0;state.totalWrong++;sfx(false);document.getElementById("feedback").innerHTML=`⏰ ¡Tiempo! Era: <b>${ans}</b>`;setTimeout(nQ,1200);}
function aQ(btn,sel,ans){clearInterval(qTimer);document.querySelectorAll("#op .option").forEach(b=>b.disabled=true);if(sel===ans){btn.classList.add("correct");qS++;combo++;state.totalCorrect++;if(combo>state.bestCombo)state.bestCombo=combo;sfx(true);document.getElementById("feedback").innerHTML=combo>1?`✅ ¡Correcto! 🔥x${combo}`:"✅ ¡Correcto!";}else{btn.classList.add("wrong");combo=0;state.totalWrong++;sfx(false);document.querySelectorAll("#op .option").forEach(b=>{if(b.textContent===ans)b.classList.add("correct");});document.getElementById("feedback").innerHTML=`❌ Era: <b>${ans}</b>`;}setTimeout(nQ,1100);}
function nQ(){qI++;if(qI>=qQ.length){const st=qS===qQ.length?3:qS>=qQ.length-1?2:1;finish("quiz",st,qS*12+combo*2,qS*6);}else showQ();}

/* 4.HUNT */
let hW=[],hG=[],hSel=[];
function gHunt(){const sz=curW.diff>=4?9:8;const words=shuf([...curW.vocab]).map(x=>x.en.toUpperCase().replace(/[^A-Z]/g,"")).filter(w=>w.length<=sz&&w.length>=3).slice(0,4);hW=[...words];hSel=[];hG=Array.from({length:sz},()=>Array(sz).fill(""));words.forEach(w=>place(w,sz));for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)if(!hG[r][c])hG[r][c]="ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];document.getElementById("gameBox").innerHTML=`<div id="feedback">Encuentra: <b>${words.join(", ")}</b></div><div class="hunt-grid" style="grid-template-columns:repeat(${sz},1fr)" id="hg"></div><p style="text-align:center;color:#999">Toca letras seguidas →/↓</p>`;const grid=document.getElementById("hg");for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){const e=document.createElement("div");e.className="hunt-cell";e.textContent=hG[r][c];e.onclick=()=>hClick(e,r,c);grid.appendChild(e);}}
function place(w,sz){for(let t=0;t<80;t++){const d=Math.random()>.5?"h":"v",r=Math.floor(Math.random()*sz),c=Math.floor(Math.random()*sz);if(d==="h"&&c+w.length<=sz){let ok=1;for(let i=0;i<w.length;i++)if(hG[r][c+i]&&hG[r][c+i]!==w[i])ok=0;if(ok){for(let i=0;i<w.length;i++)hG[r][c+i]=w[i];return;}}if(d==="v"&&r+w.length<=sz){let ok=1;for(let i=0;i<w.length;i++)if(hG[r+i][c]&&hG[r+i][c]!==w[i])ok=0;if(ok){for(let i=0;i<w.length;i++)hG[r+i][c]=w[i];return;}}}}
function hClick(e,r,c){if(e.classList.contains("found"))return;e.classList.toggle("sel");const i=hSel.findIndex(s=>s.r===r&&s.c===c);if(i>=0)hSel.splice(i,1);else hSel.push({r,c,e});const word=hSel.map(s=>hG[s.r][s.c]).join("");if(hW.includes(word)){hSel.forEach(s=>{s.e.classList.remove("sel");s.e.classList.add("found");});hW=hW.filter(x=>x!==word);hSel=[];sfx(true);document.getElementById("feedback").innerHTML=`✅ ¡${word}! Faltan: ${hW.join(", ")||"¡ninguna!"}`;if(!hW.length)finish("hunt",3,50,25);}}

/* 5.SPEAK */
let sI=0;
function gSpeak(){sI=0;showSp();}
function showSp(){const x=curW.vocab[sI];document.getElementById("gameBox").innerHTML=`<div class="emoji-big">${x.emoji}</div><div class="question">Repite: "${x.en}"</div><div id="feedback">🔊 escucha · 🎤 repite</div><div style="text-align:center"><button class="speak-btn" onclick="speak('${x.en.replace(/'/g,"")}')">🔊</button><button class="speak-btn" onclick="listen('${x.en.replace(/'/g,"")}')" style="background:var(--no);box-shadow:0 6px 0 #b71c1c">🎤</button></div><p style="text-align:center;color:#999">${sI+1}/${curW.vocab.length}</p><button class="btn btn-ok btn-block" onclick="nSp()">Continuar ➡️</button>`;speak(x.en);}
function nSp(){sI++;if(sI>=curW.vocab.length)finish("speak",3,35,18);else showSp();}
function listen(word){const fb=document.getElementById("feedback");const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){fb.innerHTML="🎙️ ¡Dilo en voz alta! 🌟";sfx(true);return;}const r=new SR();r.lang="en-US";fb.innerHTML="🎙️ Escuchando...";r.onresult=e=>{const said=e.results[0][0].transcript.toLowerCase();if(said.includes(word.toLowerCase())){fb.innerHTML="✅ ¡Perfecto! 🌟";sfx(true);state.totalCorrect++;}else{fb.innerHTML=`👂 Dijiste "${said}". ¡Otra vez!`;sfx(false);}};r.onerror=()=>fb.innerHTML="🎙️ ¡Sigue!";r.start();}

/* 6.LISTEN */
let liI=0,liS=0,liQ=[];
function gListen(){const n=curW.diff>=3?6:5;liQ=shuf([...curW.vocab]).slice(0,n).map(x=>{const w=shuf(curW.vocab.filter(y=>y.en!==x.en)).slice(0,3);return{word:x.en,opts:shuf([x,...w])};});liI=0;liS=0;showLi();}
function showLi(){const q=liQ[liI];document.getElementById("gameBox").innerHTML=`<div class="health-bar">👂 ${liI+1}/${liQ.length}</div><p style="text-align:center">Escucha y elige el dibujo:</p><div style="text-align:center"><button class="speak-btn" onclick="speak('${q.word.replace(/'/g,"")}')">🔊</button></div><div id="feedback"></div><div class="options" id="op"></div>`;const o=document.getElementById("op");q.opts.forEach(opt=>{const b=document.createElement("button");b.className="option";b.style.fontSize="2.2rem";b.textContent=opt.emoji;b.onclick=()=>aLi(b,opt.en,q.word);o.appendChild(b);});setTimeout(()=>speak(q.word),300);}
function aLi(btn,sel,ans){document.querySelectorAll("#op .option").forEach(b=>b.disabled=true);if(sel===ans){btn.classList.add("correct");liS++;state.totalCorrect++;sfx(true);document.getElementById("feedback").innerHTML="✅ ¡Correcto!";}else{btn.classList.add("wrong");state.totalWrong++;sfx(false);document.getElementById("feedback").innerHTML=`❌ Era "${ans}"`;}setTimeout(()=>{liI++;if(liI>=liQ.length){const st=liS===liQ.length?3:liS>=liQ.length-1?2:1;finish("listen",st,liS*12,liS*6);}else showLi();},1100);}

function showGr(){const q=grQ[grI];document.getElementById("gameBox").innerHTML=`<div class="health-bar">🧩 ${grI+1}/${grQ.length}</div><div class="question">${q.q}</div><div id="feedback"></div><div class="options" id="op"></div>`;const o=document.getElementById("op");shuf([...q.opts]).forEach(opt=>{const b=document.createElement("button");b.className="option";b.textContent=opt;b.onclick=()=>aGr(b,opt,q);o.appendChild(b);});}
function aGr(btn,sel,q){document.querySelectorAll("#op .option").forEach(b=>b.disabled=true);if(sel===q.a){btn.classList.add("correct");grS++;state.totalCorrect++;sfx(true);document.getElementById("feedback").innerHTML="✅ ¡Correcto!";}else{btn.classList.add("wrong");state.totalWrong++;sfx(false);document.querySelectorAll("#op .option").forEach(b=>{if(b.textContent===q.a)b.classList.add("correct");});document.getElementById("feedback").innerHTML=`💡 ${q.tip}`;}setTimeout(()=>{grI++;if(grI>=grQ.length){const st=grS===grQ.length?3:grS>=grQ.length-1?2:1;finish("grammar",st,grS*14,grS*7);}else showGr();},1500);}

/* 8.BUILD */
let bI=0,bS=0,bQ=[],bBuilt=[];
function gBuild(){bQ=shuf([...curW.sentences]);bI=0;bS=0;showB();}
function showB(){const q=bQ[bI];bBuilt=[];document.getElementById("gameBox").innerHTML=`<div class="health-bar">🏗️ ${bI+1}/${bQ.length}</div><p style="text-align:center">Ordena las palabras:</p><div class="builder-zone" id="z"><span style="color:#999">Toca abajo 👇</span></div><div id="feedback"></div><div class="options" id="ch" style="grid-template-columns:repeat(auto-fit,minmax(75px,1fr))"></div><button class="btn btn-ok btn-block" id="cb" onclick="ckB()">✅ Comprobar</button>`;const c=document.getElementById("ch");shuf([...q.w]).forEach(w=>{const x=document.createElement("div");x.className="word-chip";x.textContent=w;x.onclick=()=>{x.classList.add("used");bBuilt.push({w,el:x});rZ();};c.appendChild(x);});}
function rZ(){const z=document.getElementById("z");z.innerHTML="";bBuilt.forEach((b,i)=>{const s=document.createElement("span");s.className="word-chip";s.style.background="var(--s)";s.style.color="#fff";s.textContent=b.w;s.onclick=()=>{b.el.classList.remove("used");bBuilt.splice(i,1);rZ();};z.appendChild(s);});if(!bBuilt.length)z.innerHTML='<span style="color:#999">Toca abajo 👇</span>';}
function ckB(){const q=bQ[bI];const made=bBuilt.map(b=>b.w).join(" ");if(made.toLowerCase()===q.a.toLowerCase()){bS++;state.totalCorrect++;sfx(true);document.getElementById("feedback").innerHTML="✅ ¡Perfecto!";}else{state.totalWrong++;sfx(false);document.getElementById("feedback").innerHTML=`💡 Correcto: <b>${q.a}</b>`;}document.getElementById("cb").disabled=true;setTimeout(()=>{bI++;if(bI>=bQ.length){const st=bS===bQ.length?3:bS>=1?2:1;finish("build",st,bS*18,bS*9);}else showB();},1600);}

/* 9.BOSS con SUDDEN DEATH */
let bossHP,bossQ,boI,heroHP,sudden;
function gBoss(){bossHP=100;heroHP=curW.diff>=4?2:3;boI=0;sudden=false;const vq=curW.vocab.map(x=>({q:`What is "${x.en}"?`,a:x.es,opts:shuf([x.es,...shuf(curW.vocab.filter(y=>y.en!==x.en)).slice(0,3).map(y=>y.es)])}));const gq=curW.grammar.map(x=>({q:x.q,a:x.a,opts:x.opts}));bossQ=shuf([...vq,...gq]).slice(0,curW.diff>=4?9:7);rBoss();}
function rBoss(){if(bossHP<=0)return bossWin();if(heroHP<=0)return bossLose();if(boI>=bossQ.length){sudden=true;boI=0;bossQ=shuf(bossQ);}const q=bossQ[boI];const sd=bossHP<=25||sudden;document.getElementById("gameBox").innerHTML=`${sd?'<div class="sd-banner">💀 SUDDEN DEATH 💀</div>':""}<div class="battle-scene"><div class="fighter"><div class="char" id="hero">${state.avatar}</div><div class="health-bar">${"❤️".repeat(heroHP)}</div></div><div style="font-size:1.8rem">⚔️</div><div class="fighter"><div class="char" id="boss" style="font-size:4rem">${curW.emoji}</div><div class="enemy-hp"><div class="enemy-hp-fill" style="width:${bossHP}%"></div></div></div></div><div class="health-bar">Golpe ${boI+1}</div><div class="question">${q.q}</div><div id="feedback"></div><div class="options" id="op"></div>`;const o=document.getElementById("op");shuf([...q.opts]).forEach(opt=>{const b=document.createElement("button");b.className="option";b.textContent=opt;b.onclick=()=>aBoss(b,opt,q.a,sd);o.appendChild(b);});}
function aBoss(btn,sel,ans,sd){document.querySelectorAll("#op .option").forEach(b=>b.disabled=true);if(sel===ans){btn.classList.add("correct");bossHP-=sd?40:Math.ceil(100/bossQ.length);document.getElementById("boss").classList.add("hit");state.totalCorrect++;sfx(true);document.getElementById("feedback").innerHTML="⚔️ ¡Golpe crítico!";}else{btn.classList.add("wrong");heroHP-=sd?2:1;document.getElementById("hero").classList.add("hit");state.totalWrong++;sfx(false);document.querySelectorAll("#op .option").forEach(b=>{if(b.textContent===ans)b.classList.add("correct");});document.getElementById("feedback").innerHTML=`💥 ¡Te golpeó! Era: <b>${ans}</b>`;}setTimeout(()=>{boI++;rBoss();},1200);}
function bossWin(){if(sudden||curW.diff>=4)state.sdWins++;finish("boss",3,100,50,true);}
function bossLose(){document.getElementById("gameBox").innerHTML=`<div class="emoji-big">😵</div><div class="question">¡El jefe te venció!</div><p style="text-align:center">¡Repasa y reinténtalo, héroe!</p><button class="btn btn-p btn-block" onclick="gBoss()">🔄 Reintentar</button><button class="btn btn-block" onclick="quitGame()">⬅️ Salir</button>`;sfx(false);}

/* FINISH */
function finish(type,stars,xp,coins,isBoss){if(!state.progress[curW.id])state.progress[curW.id]={};const prev=state.progress[curW.id][type]||0;state.progress[curW.id][type]=Math.max(prev,stars);const gx=prev===0?xp:Math.floor(xp/3),gc=prev===0?coins:Math.floor(coins/3);state.xp+=gx;state.coins+=gc;if(stars===3)state.perfectMissions++;const nl=Math.floor(state.xp/100)+1,up=nl>state.level;state.level=nl;if(isBoss&&!state.masteredTopics.includes(curW.theme))state.masteredTopics.push(curW.theme);checkBadges();save();confetti();const last=isBoss&&curW.id==="dragon";const box=document.getElementById("modalBox");box.innerHTML=`<div class="big-emoji">${last?"👑":stars===3?"🏆":"🎉"}</div><h2 style="color:var(--p);text-shadow:none">${last?"¡LEYENDA MÁXIMA!":"¡Completada!"}</h2><div style="font-size:1.8rem">${"⭐".repeat(stars)}${"☆".repeat(3-stars)}</div><div class="reward-line">+${gx} XP ⚡</div><div class="reward-line">+${gc} 🪙</div>${up?`<div class="reward-line">🆙 ¡Nivel ${state.level}!</div>`:""}${isBoss&&!last?`<div class="reward-line">🌍 ¡Nuevo mundo desbloqueado!</div>`:""}${last?`<div class="reward-line">🎓 ¡Eres MAESTRO B1+ del inglés!</div>`:""}<button class="btn btn-ok btn-block" onclick="closeModal();quitGame()">¡Continuar! ✅</button>`;document.getElementById("modal").classList.add("active");}

dge-grid">${ALL_BADGES.map(b=>{const got=state.badges.includes(b.id);if(b.secret&&!got)return`<div class="badge locked" title="Insignia secreta 🤫">❔</div>`;return`<div class="badge ${got?"":"locked"}" title="${b.n}">${b.e}</div>`;}).join("")}</div><button class="btn btn-block" onclick="resetGame()" style="background:#ff7675;color:#fff">🔄 Reiniciar Todo</button>`;}

/* UTILS */
function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function closeModal(){document.getElementById("modal").classList.remove("active");}
function speak(t){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=.85;u.pitch=1.1;speechSynthesis.speak(u);}
let actx;function sfx(ok){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g2=actx.createGain();o.connect(g2);g2.connect(actx.destination);if(ok){o.frequency.setValueAtTime(523,actx.currentTime);o.frequency.setValueAtTime(784,actx.currentTime+.1);}else{o.frequency.setValueAtTime(300,actx.currentTime);o.frequency.setValueAtTime(180,actx.currentTime+.1);}g2.gain.setValueAtTime(.2,actx.currentTime);g2.gain.exponentialRampToValueAtTime(.01,actx.currentTime+.3);o.start();o.stop(actx.currentTime+.3);}catch(e){}}
function confetti(){const cs=["#fdcb6e","#6c5ce7","#00cec9","#fd79a8","#00b894","#e17055"];for(let i=0;i<55;i++){const c=document.createElement("div");c.className="confetti";c.style.left=Math.random()*100+"vw";c.style.background=cs[Math.floor(Math.random()*cs.length)];c.style.animationDuration=(1+Math.random()*2)+"s";c.style.borderRadius=Math.random()>.5?"50%":"0";document.body.appendChild(c);setTimeout(()=>c.remove(),3000);}}
function toast(m){const t=document.createElement("div");t.textContent=m;t.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2d3436;color:#fff;padding:14px 22px;border-radius:50px;z-index:300;font-weight:bold;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:pop .4s;max-width:90%;text-align:center;";document.body.appendChild(t);setTimeout(()=>{t.style.transition=".5s";t.style.opacity="0";setTimeout(()=>t.remove(),500);},2500);}
</script>
