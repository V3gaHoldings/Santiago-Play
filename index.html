.screen{display:none;min-height:100vh;padding:18px;animation:fadeIn .4s;}

var state=loadState();
function defaultState(){return{name:"",avatar:"🦸",owned:["🦸","🦸‍♀️","🧙","🥷"],xp:0,coins:0,level:1,streak:1,lastPlay:new Date().toDateString(),progress:{},badges:[],totalCorrect:0,totalWrong:0,playSeconds:0,masteredTopics:[],bestCombo:0,perfectMissions:0,sdWins:0};}
function loadState(){try{var x=JSON.parse(localStorage.getItem("ehq_ult2"));if(x){updateStreak(x);var d=defaultState();for(var k in d)if(!(k in x))x[k]=d[k];return x;}}catch(e){}return defaultState();}
function updateStreak(x){var t=new Date().toDateString();if(x.lastPlay!==t){var dif=(new Date(t)-new Date(x.lastPlay))/86400000;if(dif===1)x.streak=(x.streak||1)+1;else if(dif>1)x.streak=1;x.lastPlay=t;}}
function save(){localStorage.setItem("ehq_ult2",JSON.stringify(state));}
setInterval(function(){state.playSeconds+=15;save();},15000);

function showScreen(id){var ss=document.querySelectorAll(".screen");for(var i=0;i<ss.length;i++)ss[i].classList.remove("active");document.getElementById(id).classList.add("active");window.scrollTo(0,0);}
function goWelcome(){if(state.name){showScreen("screen-map");renderMap();}else{showScreen("screen-avatar");renderAvatars();}}

var selAva="🦸";
function renderAvatars(){var grid=document.getElementById("avatarGrid");grid.innerHTML="";["🦸","🦸‍♀️","🧙","🥷"].forEach(function(a){var d=document.createElement("div");d.className="avatar-card"+(a===selAva?" selected":"");d.innerHTML='<div class="emoji">'+a+'</div>';d.onclick=function(){selAva=a;renderAvatars();};grid.appendChild(d);});}
function confirmAvatar(){var n=document.getElementById("playerName").value.trim();if(!n){alert("Escribe tu nombre! 😊");return;}state.name=n;state.avatar=selAva;save();showScreen("screen-map");renderMap();}

function hudHTML(){var cur=state.xp-(state.level-1)*100;return '<div class="hud-item"><span class="ic">'+state.avatar+'</span>'+state.name+'</div><div class="hud-item"><span class="ic">⭐</span>Nv.'+state.level+'</div><div class="hud-item"><span class="ic">⚡</span>'+state.xp+'</div><div class="hud-item"><span class="ic">🪙</span>'+state.coins+'</div><div class="hud-item"><span class="ic">🔥</span>'+state.streak+'d</div><div class="xpbar"><div style="width:'+Math.min(100,cur)+'%"></div></div>';}
function refreshHUD(){["hud","hud2","hud3"].forEach(function(id){var e=document.getElementById(id);if(e)e.innerHTML=hudHTML();});}

function worldUnlocked(i){if(i===0)return true;var p=state.progress[GAME_DATA.worlds[i-1].id]||{};return(p.boss||0)>0;}
function worldStars(w){var p=state.progress[w]||{},t=0;for(var k in p)t+=p[k];return t;}
function renderMap(){refreshHUD();var grid=document.getElementById("worldGrid");grid.innerHTML="";GAME_DATA.worlds.forEach(function(w,i){var u=worldUnlocked(i),st=worldStars(w.id),max=MISSION_TYPES.length*3,pct=Math.round(st/max*100);var d=document.createElement("div");d.className="world-card"+(u?"":" locked");d.style.borderTop="7px solid "+w.color;d.innerHTML='<div class="num-badge">'+(i+1)+'</div>'+(u?"":'<div class="lock-badge">🔒</div>')+'<div class="wemoji">'+w.emoji+'</div><h3>'+w.name+'</h3><span class="diff-tag" style="background:'+DIFF_COLORS[w.diff]+'">'+w.level+' '+repeat("🔥",w.diff)+'</span><div class="world-stars">'+(pct===100?"🏆":"⭐")+' '+st+'/'+max+'</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';d.onclick=u?(function(id){return function(){openWorld(id);};})(w.id):function(){toast("🔒 Vence el jefe del mundo anterior!");};grid.appendChild(d);});}
function repeat(s,n){var r="";for(var i=0;i<n;i++)r+=s;return r;}

var curW=null;
function openWorld(id){for(var i=0;i<GAME_DATA.worlds.length;i++)if(GAME_DATA.worlds[i].id===id)curW=GAME_DATA.worlds[i];showScreen("screen-missions");renderMissions();}
function missionUnlocked(i){if(i===0)return true;var p=state.progress[curW.id]||{};return(p[MISSION_TYPES[i-1].type]||0)>0;}
function renderMissions(){refreshHUD();document.getElementById("worldTitle").innerHTML=curW.emoji+' '+curW.name+' <span class="diff-tag" style="background:'+DIFF_COLORS[curW.diff]+'">'+curW.level+'</span>';var l=document.getElementById("missionList");l.innerHTML="";var p=state.progress[curW.id]||{};MISSION_TYPES.forEach(function(m,i){var u=missionUnlocked(i),st=p[m.type]||0;var c=document.createElement("div");c.className="mission-card"+(st>0?" done":"")+(u?"":" locked");c.innerHTML='<div class="mission-icon">'+m.icon+'</div><div class="mission-info"><h4>'+m.title+'</h4><p>'+m.desc+'</p></div><div class="world-stars">'+(st>0?repeat("⭐",st):(u?"▶️":"🔒"))+'</div>';c.onclick=u?(function(t){return function(){startMission(t);};})(m.type):function(){toast("🔒 Completa la mision anterior!");};l.appendChild(c);});}

var actM=null,combo=0;
function startMission(t){actM=t;combo=0;showScreen("screen-game");refreshHUD();var m;for(var i=0;i<MISSION_TYPES.length;i++)if(MISSION_TYPES[i].type===t)m=MISSION_TYPES[i];document.getElementById("gameTitle").textContent=m.icon+' '+m.title;({learn:gLearn,memory:gMemory,quiz:gQuiz,hunt:gHunt,speak:gSpeak,listen:gListen,grammar:gGrammar,build:gBuild,boss:gBoss})[t]();}
function quitGame(){clearInterval(qTimer);showScreen("screen-missions");renderMissions();}

function adaptiveTime(base){var tot=state.totalCorrect+state.totalWrong;var acc=tot?state.totalCorrect/tot:0.7;var t=base-curW.diff;if(acc>0.85)t-=1;if(acc<0.5)t+=2;return Math.max(3,t);}

/* 1.LEARN */
var lI=0;
function gLearn(){lI=0;showLearn();}
function showLearn(){var x=curW.vocab[lI];document.getElementById("gameBox").innerHTML='<div class="emoji-big">'+x.emoji+'</div><div class="question">'+x.en+'</div><p style="text-align:center;font-size:1.2rem;color:#636e72">= '+x.es+'</p><div style="text-align:center"><button class="speak-btn" onclick="speak(\''+x.en.replace(/'/g,"")+'\')">🔊</button></div><p style="text-align:center;color:#999">'+(lI+1)+'/'+curW.vocab.length+'</p><button class="btn btn-p btn-block" onclick="nLearn()">'+(lI<curW.vocab.length-1?"Siguiente ➡️":"Terminar! ✅")+'</button>';speak(x.en);}
function nLearn(){lI++;if(lI>=curW.vocab.length)finish("learn",3,30,15,false);else showLearn();}

/* 2.MEMORY */
var mF=[],mM=0,mL=false,mT=0;
function gMemory(){var n=curW.diff>=3?8:6;var voc=shuf(curW.vocab.slice()).slice(0,n);mT=n;var cards=[];voc.forEach(function(x){cards.push({k:x.en,d:x.en});cards.push({k:x.en,d:x.emoji});});cards=shuf(cards);mF=[];mM=0;mL=false;document.getElementById("gameBox").innerHTML='<div id="feedback">Empareja palabra-dibujo 🃏</div><div class="memory-grid" style="grid-template-columns:repeat(4,1fr)" id="mg"></div>';var grid=document.getElementById("mg");cards.forEach(function(c){var e=document.createElement("div");e.className="mem-card";e.textContent="?";e.onclick=function(){flip(e,c);};grid.appendChild(e);});}
function flip(el,c){if(mL||el.classList.contains("flipped")||el.classList.contains("matched"))return;el.classList.add("flipped");el.textContent=c.d;mF.push({el:el,c:c});if(mF.length===2){mL=true;var a=mF[0],b=mF[1];if(a.c.k===b.c.k){setTimeout(function(){a.el.classList.add("matched");b.el.classList.add("matched");mM++;sfx(true);document.getElementById("feedback").textContent="Bien! 🎉";mF=[];mL=false;if(mM===mT)finish("memory",3,45,22,false);},400);}else{sfx(false);setTimeout(function(){a.el.classList.remove("flipped");b.el.classList.remove("flipped");a.el.textContent="?";b.el.textContent="?";mF=[];mL=false;},800);}}}

var qI=0,qS=0,qQ=[],qTimer,qLim;
function gQuiz(){var n=curW.diff>=3?6:5;qQ=shuf(curW.vocab.slice()).slice(0,n).map(function(x){var w=shuf(curW.vocab.filter(function(y){return y.en!==x.en;})).slice(0,3).map(function(y){return y.es;});return{emoji:x.emoji,en:x.en,a:x.es,opts:shuf([x.es].concat(w))};});qI=0;qS=0;showQ();}

function gHunt(){var sz=curW.diff>=4?9:8;var words=shuf(curW.vocab.slice()).map(function(x){return x.en.toUpperCase().replace(/[^A-Z]/g,"");}).filter(function(w){return w.length<=sz&&w.length>=3;}).slice(0,4);hW=words.slice();hSel=[];hG=[];for(var r=0;r<sz;r++){hG.push([]);for(var c=0;c<sz;c++)hG[r].push("");}words.forEach(function(w){place(w,sz);});for(var r2=0;r2<sz;r2++)for(var c2=0;c2<sz;c2++)if(!hG[r2][c2])hG[r2][c2]="ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];document.getElementById("gameBox").innerHTML='<div id="feedback">Encuentra: <b>'+words.join(", ")+'</b></div><div class="hunt-grid" style="grid-template-columns:repeat('+sz+',1fr)" id="hg"></div><p style="text-align:center;color:#999">Toca letras seguidas →/↓</p>';var grid=document.getElementById("hg");for(var r3=0;r3<sz;r3++)for(var c3=0;c3<sz;c3++){(function(r,c){var e=document.createElement("div");e.className="hunt-cell";e.textContent=hG[r][c];e.onclick=function(){hClick(e,r,c);};grid.appendChild(e);})(r3,c3);}}
function place(w,sz){for(var t=0;t<80;t++){var d=Math.random()>.5?"h":"v",r=Math.floor(Math.random()*sz),c=Math.floor(Math.random()*sz);if(d==="h"&&c+w.length<=sz){var ok=1;for(var i=0;i<w.length;i++)if(hG[r][c+i]&&hG[r][c+i]!==w[i])ok=0;if(ok){for(var i2=0;i2<w.length;i2++)hG[r][c+i2]=w[i2];return;}}if(d==="v"&&r+w.length<=sz){var ok2=1;for(var k=0;k<w.length;k++)if(hG[r+k][c]&&hG[r+k][c]!==w[k])ok2=0;if(ok2){for(var k2=0;k2<w.length;k2++)hG[r+k2][c]=w[k2];return;}}}}
function hClick(e,r,c){if(e.classList.contains("found"))return;e.classList.toggle("sel");var idx=-1;for(var i=0;i<hSel.length;i++)if(hSel[i].r===r&&hSel[i].c===c)idx=i;if(idx>=0)hSel.splice(idx,1);else hSel.push({r:r,c:c,e:e});var word=hSel.map(function(s){return hG[s.r][s.c];}).join("");if(hW.indexOf(word)>=0){hSel.forEach(function(s){s.e.classList.remove("sel");s.e.classList.add("found");});hW=hW.filter(function(x){return x!==word;});hSel=[];sfx(true);document.getElementById("feedback").innerHTML='✅ '+word+'! Faltan: '+(hW.join(", ")||"ninguna!");if(!hW.length)finish("hunt",3,50,25,false);}}

function shuf(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function closeModal(){document.getElementById("modal").classList.remove("active");}
function speak(t){try{if(!window.speechSynthesis)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=.85;u.pitch=1.1;speechSynthesis.speak(u);}catch(e){}}
var actx;function sfx(ok){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();var o=actx.createOscillator(),gg=actx.createGain();o.connect(gg);gg.connect(actx.destination);if(ok){o.frequency.setValueAtTime(523,actx.currentTime);o.frequency.setValueAtTime(784,actx.currentTime+.1);}else{o.frequency.setValueAtTime(300,actx.currentTime);o.frequency.setValueAtTime(180,actx.currentTime+.1);}gg.gain.setValueAtTime(.2,actx.currentTime);gg.gain.exponentialRampToValueAtTime(.01,actx.currentTime+.3);o.start();o.stop(actx.currentTime+.3);}catch(e){}}
function confetti(){var cs=["#fdcb6e","#6c5ce7","#00cec9","#fd79a8","#00b894","#e17055"];for(var i=0;i<55;i++){(function(){var c=document.createElement("div");c.className="confetti";c.style.left=Math.random()*100+"vw";c.style.background=cs[Math.floor(Math.random()*cs.length)];c.style.animationDuration=(1+Math.random()*2)+"s";c.style.borderRadius=Math.random()>.5?"50%":"0";document.body.appendChild(c);setTimeout(function(){c.remove();},3000);})();}}
function toast(m){var t=document.createElement("div");t.textContent=m;t.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2d3436;color:#fff;padding:14px 22px;border-radius:50px;z-index:300;font-weight:bold;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:pop .4s;max-width:90%;text-align:center;";document.body.appendChild(t);setTimeout(function(){t.style.transition=".5s";t.style.opacity="0";setTimeout(function(){t.remove();},500);},2500);}
</script>
