<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Hero Quest 🎮</title>
<style>
  :root{
    --primary:#6c5ce7; --secondary:#00cec9; --accent:#fdcb6e;
    --success:#00b894; --danger:#d63031; --dark:#2d3436;
    --light:#dfe6e9; --bg:#74b9ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Comic Sans MS','Trebuchet MS',sans-serif;-webkit-tap-highlight-color:transparent;}
  body{background:linear-gradient(135deg,#74b9ff,#a29bfe);min-height:100vh;color:var(--dark);overflow-x:hidden;}
  .screen{display:none;min-height:100vh;padding:20px;animation:fadeIn .4s;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  .container{max-width:900px;margin:0 auto;}
  h1{font-size:2.5rem;text-align:center;color:#fff;text-shadow:3px 3px 0 #6c5ce7,5px 5px 10px rgba(0,0,0,.3);margin:10px 0;}
  h2{color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.2);margin:15px 0;text-align:center;}

  .btn{background:var(--accent);border:none;padding:15px 30px;font-size:1.2rem;border-radius:50px;cursor:pointer;
    font-weight:bold;color:var(--dark);box-shadow:0 6px 0 #e1a93a;transition:.1s;margin:8px;display:inline-block;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #e1a93a;}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 0 #4834b0;}
  .btn-primary:active{box-shadow:0 2px 0 #4834b0;}
  .btn-success{background:var(--success);color:#fff;box-shadow:0 6px 0 #00876a;}
  .btn-block{display:block;width:100%;margin:10px 0;}

  /* HUD */
  .hud{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.9);
    border-radius:20px;padding:10px 15px;margin-bottom:15px;flex-wrap:wrap;gap:10px;box-shadow:0 4px 10px rgba(0,0,0,.2);}
  .hud-item{display:flex;align-items:center;gap:5px;font-weight:bold;font-size:1rem;}
  .hud-item span.icon{font-size:1.4rem;}

  /* Avatar select */
  .avatar-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:15px;margin:20px 0;}
  .avatar-card{background:#fff;border-radius:20px;padding:15px;text-align:center;cursor:pointer;transition:.2s;border:4px solid transparent;}
  .avatar-card .emoji{font-size:3rem;}
  .avatar-card.selected{border-color:var(--accent);transform:scale(1.05);background:#fff9e6;}
  .avatar-card:hover{transform:translateY(-5px);}

  /* World map */
  .world-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:20px 0;}
  .world-card{background:#fff;border-radius:25px;padding:20px;text-align:center;cursor:pointer;transition:.2s;
    position:relative;box-shadow:0 8px 20px rgba(0,0,0,.2);overflow:hidden;}
  .world-card:hover{transform:translateY(-8px) scale(1.02);}
  .world-card.locked{filter:grayscale(.8);opacity:.7;cursor:not-allowed;}
  .world-card .wemoji{font-size:4rem;animation:bounce 2s infinite;}
  .world-card h3{margin:10px 0;color:var(--dark);}
  .lock-badge{position:absolute;top:10px;right:10px;font-size:1.8rem;}
  .progress-bar{background:#dfe6e9;border-radius:10px;height:14px;overflow:hidden;margin-top:10px;}
  .progress-fill{background:linear-gradient(90deg,#00b894,#00cec9);height:100%;transition:width .5s;border-radius:10px;}
  .world-stars{color:var(--accent);font-size:1.3rem;}

  /* Mission list */
  .mission-card{background:#fff;border-radius:20px;padding:18px;margin:12px 0;display:flex;align-items:center;
    gap:15px;cursor:pointer;transition:.2s;box-shadow:0 4px 12px rgba(0,0,0,.15);}
  .mission-card:hover{transform:translateX(8px);}
  .mission-card.done{background:#d4f8e8;}
  .mission-card.locked{filter:grayscale(.7);opacity:.6;cursor:not-allowed;}
  .mission-icon{font-size:2.5rem;}
  .mission-info{flex:1;}
  .mission-info h4{font-size:1.1rem;}
  .mission-info p{font-size:.85rem;color:#636e72;}

  /* Game area */
  .game-box{background:rgba(255,255,255,.95);border-radius:25px;padding:25px;margin-top:15px;box-shadow:0 10px 30px rgba(0,0,0,.2);min-height:300px;}
  .question{font-size:1.6rem;text-align:center;margin:20px 0;font-weight:bold;}
  .emoji-big{font-size:5rem;text-align:center;animation:pop .4s;}
  .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:20px;}
  .option{background:var(--secondary);color:#fff;padding:18px;border-radius:15px;font-size:1.2rem;font-weight:bold;
    cursor:pointer;text-align:center;transition:.15s;border:none;box-shadow:0 5px 0 #00a99d;}
  .option:active{transform:translateY(3px);box-shadow:0 2px 0 #00a99d;}
  .option.correct{background:var(--success)!important;box-shadow:0 5px 0 #00876a;animation:pop .3s;}
  .option.wrong{background:var(--danger)!important;box-shadow:0 5px 0 #b71c1c;animation:shake .4s;}

  /* Memory */
  .memory-grid{display:grid;gap:10px;margin-top:20px;}
  .mem-card{aspect-ratio:1;background:var(--primary);border-radius:15px;display:flex;align-items:center;
    justify-content:center;font-size:1.5rem;cursor:pointer;color:#fff;transition:.3s;transform-style:preserve-3d;}
  .mem-card.flipped{background:#fff;color:var(--dark);transform:rotateY(180deg);box-shadow:inset 0 0 0 3px var(--accent);}
  .mem-card.matched{background:var(--success);color:#fff;cursor:default;animation:pop .3s;}

  /* Feedback */
  #feedback{text-align:center;font-size:1.4rem;font-weight:bold;min-height:30px;margin:15px 0;}
  .health-bar{display:flex;justify-content:center;gap:5px;margin:10px 0;font-size:1.8rem;}

  /* Battle */
  .battle-scene{display:flex;justify-content:space-around;align-items:center;margin:20px 0;}
  .fighter{text-align:center;}
  .fighter .char{font-size:4rem;}
  .enemy-hp{background:#dfe6e9;border-radius:10px;height:20px;width:120px;overflow:hidden;margin-top:5px;}
  .enemy-hp-fill{background:var(--danger);height:100%;transition:width .4s;}

  /* Modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px;}
  .modal.active{display:flex;animation:fadeIn .3s;}
  .modal-box{background:#fff;border-radius:30px;padding:35px;text-align:center;max-width:400px;width:100%;animation:pop .5s;}
  .modal-box .big-emoji{font-size:5rem;animation:bounce 1s infinite;}
  .reward-line{font-size:1.3rem;margin:8px 0;font-weight:bold;color:var(--primary);}

  /* Dashboard */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;margin:20px 0;}
  .stat-card{background:#fff;border-radius:20px;padding:20px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.15);}
  .stat-card .num{font-size:2rem;font-weight:bold;color:var(--primary);}
  .stat-card .label{font-size:.85rem;color:#636e72;}
  .badge-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:15px 0;}
  .badge{background:#fff;border-radius:50%;width:70px;height:70px;display:flex;align-items:center;justify-content:center;
    font-size:2rem;box-shadow:0 4px 10px rgba(0,0,0,.15);position:relative;}
  .badge.locked{filter:grayscale(1);opacity:.4;}

  .back-btn{background:#fff;color:var(--dark);border:none;padding:10px 20px;border-radius:50px;cursor:pointer;font-weight:bold;box-shadow:0 4px 0 #b2bec3;margin-bottom:10px;}

  /* Confetti */
  .confetti{position:fixed;width:12px;height:12px;top:-20px;z-index:200;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

  .speak-btn{background:var(--accent);border:none;border-radius:50%;width:80px;height:80px;font-size:2.5rem;cursor:pointer;
    box-shadow:0 6px 0 #e1a93a;margin:10px;}
  .speak-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #e1a93a;}

  @media(max-width:500px){h1{font-size:1.8rem;}.question{font-size:1.3rem;}.hud-item{font-size:.85rem;}}
</style>
</head>
<body>

<!-- ====== SCREEN: WELCOME ====== -->
<div id="screen-welcome" class="screen active">
  <div class="container">
    <h1>🦸 ENGLISH HERO QUEST 🌍</h1>
    <div style="text-align:center;font-size:5rem;animation:bounce 2s infinite;">🎮</div>
    <p style="text-align:center;color:#fff;font-size:1.2rem;text-shadow:1px 1px 2px #000;margin:15px 0;">
      ¡Conviértete en un héroe del inglés!<br>Viaja por mundos mágicos y aprende jugando.
    </p>
    <div style="text-align:center;">
      <button class="btn btn-primary" onclick="goWelcome()">🚀 ¡EMPEZAR AVENTURA!</button>
    </div>
  </div>
</div>

<!-- ====== SCREEN: AVATAR ====== -->
<div id="screen-avatar" class="screen">
  <div class="container">
    <h2>Elige tu Héroe</h2>
    <input id="playerName" placeholder="Escribe tu nombre..." style="width:100%;padding:15px;border-radius:15px;border:3px solid var(--accent);font-size:1.1rem;text-align:center;margin:10px 0;">
    <div class="avatar-grid" id="avatarGrid"></div>
    <button class="btn btn-success btn-block" onclick="confirmAvatar()">¡VAMOS! 🎯</button>
  </div>
</div>

<!-- ====== SCREEN: MAP ====== -->
<div id="screen-map" class="screen">
  <div class="container">
    <div class="hud" id="hud"></div>
    <div style="text-align:center;margin:10px 0;">
      <button class="btn" onclick="showScreen('screen-dashboard');renderDashboard()">📊 Mi Progreso</button>
    </div>
    <h2>🗺️ Mapa de Mundos</h2>
    <div class="world-grid" id="worldGrid"></div>
  </div>
</div>

<!-- ====== SCREEN: MISSIONS ====== -->
<div id="screen-missions" class="screen">
  <div class="container">
    <button class="back-btn" onclick="showScreen('screen-map');renderMap()">⬅️ Volver al Mapa</button>
    <div class="hud" id="hud2"></div>
    <h2 id="worldTitle"></h2>
    <div id="missionList"></div>
  </div>
</div>

<!-- ====== SCREEN: GAME ====== -->
<div id="screen-game" class="screen">
  <div class="container">
    <button class="back-btn" onclick="quitGame()">⬅️ Salir</button>
    <div class="hud" id="hud3"></div>
    <h2 id="gameTitle"></h2>
    <div class="game-box" id="gameBox"></div>
  </div>
</div>

<!-- ====== SCREEN: DASHBOARD ====== -->
<div id="screen-dashboard" class="screen">
  <div class="container">
    <button class="back-btn" onclick="showScreen('screen-map');renderMap()">⬅️ Volver</button>
    <h2>📊 Dashboard del Héroe</h2>
    <div id="dashboardContent"></div>
  </div>
</div>

<!-- ====== MODAL ====== -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
/* ============================================================
   ENGLISH HERO QUEST — Motor de juego educativo
   👉 PARA CAMBIAR EL CONTENIDO DEL PDF: edita GAME_DATA
   ============================================================ */

const GAME_DATA = {
  worlds: [
    {
      id:"jungle", name:"Jungle World", emoji:"🌴", color:"#00b894",
      theme:"Animals & Colors",
      vocab:[
        {en:"Lion",es:"León",emoji:"🦁"},{en:"Monkey",es:"Mono",emoji:"🐒"},
        {en:"Snake",es:"Serpiente",emoji:"🐍"},{en:"Tiger",es:"Tigre",emoji:"🐯"},
        {en:"Elephant",es:"Elefante",emoji:"🐘"},{en:"Frog",es:"Rana",emoji:"🐸"},
        {en:"Parrot",es:"Loro",emoji:"🦜"},{en:"Bear",es:"Oso",emoji:"🐻"}
      ],
      grammar:[
        {q:"___ is a lion.", opts:["This","Those","Are","Am"], a:"This", tip:"Usa 'This' para algo cercano y singular."},
        {q:"The monkey ___ small.", opts:["is","are","am","be"], a:"is", tip:"Con 'the monkey' (singular) usamos 'is'."},
        {q:"I ___ a hero.", opts:["am","is","are","be"], a:"am", tip:"Con 'I' siempre usamos 'am'."},
        {q:"They ___ tigers.", opts:["are","is","am","be"], a:"are", tip:"Con 'they' usamos 'are'."}
      ]
    },
    {
      id:"space", name:"Space World", emoji:"🚀", color:"#6c5ce7",
      theme:"Numbers & Family",
      vocab:[
        {en:"Mother",es:"Mamá",emoji:"👩"},{en:"Father",es:"Papá",emoji:"👨"},
        {en:"Sister",es:"Hermana",emoji:"👧"},{en:"Brother",es:"Hermano",emoji:"👦"},
        {en:"Baby",es:"Bebé",emoji:"👶"},{en:"Grandma",es:"Abuela",emoji:"👵"},
        {en:"Grandpa",es:"Abuelo",emoji:"👴"},{en:"Family",es:"Familia",emoji:"👨‍👩‍👧‍👦"}
      ],
      grammar:[
        {q:"She is my ___.", opts:["mother","apple","run","blue"], a:"mother", tip:"'Mother' es un miembro de la familia."},
        {q:"This is ___ brother.", opts:["my","I","am","is"], a:"my", tip:"'my' = mi (posesivo)."},
        {q:"___ are my parents.", opts:["They","He","She","It"], a:"They", tip:"'They' para más de una persona."},
        {q:"He ___ my father.", opts:["is","are","am","be"], a:"is", tip:"Con 'He' usamos 'is'."}
      ]
    },
    {
      id:"pirate", name:"Pirate Island", emoji:"🏴‍☠️", color:"#e17055",
      theme:"Verbs & Actions",
      vocab:[
        {en:"Run",es:"Correr",emoji:"🏃"},{en:"Jump",es:"Saltar",emoji:"🦘"},
        {en:"Swim",es:"Nadar",emoji:"🏊"},{en:"Eat",es:"Comer",emoji:"🍽️"},
        {en:"Read",es:"Leer",emoji:"📖"},{en:"Sing",es:"Cantar",emoji:"🎤"},
        {en:"Dance",es:"Bailar",emoji:"💃"},{en:"Sleep",es:"Dormir",emoji:"😴"}
      ],
      grammar:[
        {q:"I like to ___ in the sea.", opts:["swim","table","red","seven"], a:"swim", tip:"'swim' = nadar, perfecto para el mar."},
        {q:"She ___ every day.", opts:["runs","run","running","ran"], a:"runs", tip:"Con He/She/It agregamos -s al verbo."},
        {q:"We ___ pirate songs.", opts:["sing","sings","sang","singing"], a:"sing", tip:"Con 'We' el verbo va sin -s."},
        {q:"Can you ___?", opts:["jump","jumps","jumped","jumping"], a:"jump", tip:"Después de 'can' va el verbo base."}
      ]
    },
    {
      id:"magic", name:"Magic Kingdom", emoji:"🏰", color:"#fd79a8",
      theme:"Colors & Objects",
      vocab:[
        {en:"Red",es:"Rojo",emoji:"🔴"},{en:"Blue",es:"Azul",emoji:"🔵"},
        {en:"Green",es:"Verde",emoji:"🟢"},{en:"Yellow",es:"Amarillo",emoji:"🟡"},
        {en:"Crown",es:"Corona",emoji:"👑"},{en:"Sword",es:"Espada",emoji:"⚔️"},
        {en:"Star",es:"Estrella",emoji:"⭐"},{en:"Book",es:"Libro",emoji:"📕"}
      ],
      grammar:[
        {q:"The crown is ___.", opts:["yellow","run","father","swim"], a:"yellow", tip:"'yellow' es un color, ideal para una corona dorada."},
        {q:"What ___ is the sky?", opts:["color","run","eat","name"], a:"color", tip:"Preguntamos por el color: 'What color...?'"},
        {q:"I have ___ book.", opts:["a","an","are","is"], a:"a", tip:"'a' antes de palabra con sonido consonante."},
        {q:"It is ___ apple... no! a sword.", opts:["an","a","is","the"], a:"an", tip:"'an' antes de sonido vocal (apple)."}
      ]
    }
  ]
};

/* Tipos de misión por mundo */
const MISSION_TYPES = [
  {type:"learn",   icon:"📚", title:"Aprende el Vocabulario", desc:"Descubre nuevas palabras"},
  {type:"memory",  icon:"🃏", title:"Memory Match",          desc:"Empareja palabras e imágenes"},
  {type:"quiz",    icon:"⚡", title:"Quiz Arena",             desc:"Responde rápido y gana XP"},
  {type:"speak",   icon:"🎤", title:"Pronunciation Challenge",desc:"Escucha y repite"},
  {type:"grammar", icon:"🧩", title:"Grammar Quest",          desc:"Resuelve acertijos gramaticales"},
  {type:"boss",    icon:"👹", title:"Boss Battle",            desc:"¡Derrota al jefe final!"}
];

const AVATARS = ["🦸","🦸‍♀️","🧙","🧝","🥷","🧚","🦹","🤴","👸","🧞"];

/* ===================== ESTADO ===================== */
let state = loadState();

function defaultState(){
  return {
    name:"", avatar:"🦸", xp:0, coins:0, level:1, streak:1,
    lastPlay:new Date().toDateString(),
    progress:{}, // worldId -> {missionType: stars}
    badges:[], totalCorrect:0, totalWrong:0, timeStart:Date.now(), playSeconds:0,
    masteredTopics:[]
  };
}
function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem("ehq_save"));
    if(s){ updateStreak(s); return s; }
  }catch(e){}
  return defaultState();
}
function updateStreak(s){
  const today=new Date().toDateString();
  if(s.lastPlay!==today){
    const diff=(new Date(today)-new Date(s.lastPlay))/86400000;
    if(diff===1) s.streak=(s.streak||1)+1;
    else if(diff>1) s.streak=1;
    s.lastPlay=today;
  }
}
function save(){ localStorage.setItem("ehq_save",JSON.stringify(state)); }

/* auto-save cada 15s + tiempo jugado */
setInterval(()=>{ state.playSeconds+=15; save(); },15000);

/* ===================== NAVEGACIÓN ===================== */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}
function goWelcome(){
  if(state.name){ showScreen("screen-map"); renderMap(); }
  else { showScreen("screen-avatar"); renderAvatars(); }
}

/* ===================== AVATAR ===================== */
let selectedAvatar="🦸";
function renderAvatars(){
  const g=document.getElementById("avatarGrid"); g.innerHTML="";
  AVATARS.forEach(a=>{
    const d=document.createElement("div");
    d.className="avatar-card"+(a===selectedAvatar?" selected":"");
    d.innerHTML=`<div class="emoji">${a}</div>`;
    d.onclick=()=>{selectedAvatar=a;renderAvatars();};
    g.appendChild(d);
  });
}
function confirmAvatar(){
  const n=document.getElementById("playerName").value.trim();
  if(!n){ alert("¡Escribe tu nombre, héroe! 😊"); return; }
  state.name=n; state.avatar=selectedAvatar; save();
  showScreen("screen-map"); renderMap();
}

/* ===================== HUD ===================== */
function hudHTML(){
  return `
    <div class="hud-item"><span class="icon">${state.avatar}</span>${state.name}</div>
    <div class="hud-item"><span class="icon">⭐</span>Nivel ${state.level}</div>
    <div class="hud-item"><span class="icon">⚡</span>${state.xp} XP</div>
    <div class="hud-item"><span class="icon">🪙</span>${state.coins}</div>
    <div class="hud-item"><span class="icon">🔥</span>${state.streak} días</div>`;
}
function refreshHUD(){
  ["hud","hud2","hud3"].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML=hudHTML();});
}

/* ===================== MAPA ===================== */
function worldUnlocked(idx){
  if(idx===0) return true;
  const prev=GAME_DATA.worlds[idx-1];
  const p=state.progress[prev.id]||{};
  // desbloquea si completó el boss del mundo anterior
  return (p["boss"]||0)>0;
}
function worldStars(wid){
  const p=state.progress[wid]||{};
  return Object.values(p).reduce((a,b)=>a+b,0);
}
function renderMap(){
  refreshHUD();
  const g=document.getElementById("worldGrid"); g.innerHTML="";
  GAME_DATA.worlds.forEach((w,i)=>{
    const unlocked=worldUnlocked(i);
    const stars=worldStars(w.id);
    const max=MISSION_TYPES.length*3;
    const pct=Math.round(stars/max*100);
    const d=document.createElement("div");
    d.className="world-card"+(unlocked?"":" locked");
    d.style.borderTop="8px solid "+w.color;
    d.innerHTML=`
      ${unlocked?"":'<div class="lock-badge">🔒</div>'}
      <div class="wemoji">${w.emoji}</div>
      <h3>${w.name}</h3>
      <p style="color:#636e72;font-size:.85rem">${w.theme}</p>
      <div class="world-stars">${"⭐".repeat(Math.min(3,Math.ceil(stars/MISSION_TYPES.length)))||"☆"}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <small>${pct}% completado</small>`;
    if(unlocked) d.onclick=()=>openWorld(w.id);
    else d.onclick=()=>toast("🔒 ¡Completa el mundo anterior primero!");
    g.appendChild(d);
  });
}

/* ===================== MISIONES ===================== */
let currentWorld=null;
function openWorld(wid){
  currentWorld=GAME_DATA.worlds.find(w=>w.id===wid);
  showScreen("screen-missions"); renderMissions();
}
function missionUnlocked(idx){
  if(idx===0) return true;
  const p=state.progress[currentWorld.id]||{};
  return (p[MISSION_TYPES[idx-1].type]||0)>0;
}
function renderMissions(){
  refreshHUD();
  document.getElementById("worldTitle").textContent=`${currentWorld.emoji} ${currentWorld.name}`;
  const list=document.getElementById("missionList"); list.innerHTML="";
  const p=state.progress[currentWorld.id]||{};
  MISSION_TYPES.forEach((m,i)=>{
    const unlocked=missionUnlocked(i);
    const stars=p[m.type]||0;
    const c=document.createElement("div");
    c.className="mission-card"+(stars>0?" done":"")+(unlocked?"":" locked");
    c.innerHTML=`
      <div class="mission-icon">${m.icon}</div>
      <div class="mission-info">
        <h4>${m.title}</h4>
        <p>${m.desc}</p>
      </div>
      <div class="world-stars">${stars>0?"⭐".repeat(stars):(unlocked?"▶️":"🔒")}</div>`;
    if(unlocked) c.onclick=()=>startMission(m.type);
    else c.onclick=()=>toast("🔒 ¡Completa la misión anterior!");
    list.appendChild(c);
  });
}

/* ===================== JUEGO: dispatcher ===================== */
let activeMission=null;
function startMission(type){
  activeMission=type;
  showScreen("screen-game"); refreshHUD();
  const m=MISSION_TYPES.find(x=>x.type===type);
  document.getElementById("gameTitle").textContent=`${m.icon} ${m.title}`;
  ({learn:gameLearn, memory:gameMemory, quiz:gameQuiz, speak:gameSpeak,
    grammar:gameGrammar, boss:gameBoss})[type]();
}
function quitGame(){ showScreen("screen-missions"); renderMissions(); }

/* ---------- 1. LEARN ---------- */
let learnIdx=0;
function gameLearn(){
  learnIdx=0; showLearnCard();
}
function showLearnCard(){
  const v=currentWorld.vocab[learnIdx];
  const box=document.getElementById("gameBox");
  box.innerHTML=`
    <div class="emoji-big">${v.emoji}</div>

    </div>

/* ---------- 2. MEMORY ---------- */
let memFlipped=[], memMatched=0, memLock=false;
function gameMemory(){
  const vocab=shuffle([...currentWorld.vocab]).slice(0,6);
  let cards=[];
  vocab.forEach(v=>{ cards.push({k:v.en,d:v.en}); cards.push({k:v.en,d:v.emoji}); });
  cards=shuffle(cards);
  memFlipped=[]; memMatched=0; memLock=false;
  const box=document.getElementById("gameBox");
  box.innerHTML=`<div id="feedback">Empareja la palabra con su dibujo 🃏</div>
    <div class="memory-grid" style="grid-template-columns:repeat(4,1fr)" id="memGrid"></div>`;
  const grid=document.getElementById("memGrid");
  cards.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="mem-card"; el.dataset.k=c.k; el.dataset.i=i; el.textContent="?";
    el.onclick=()=>flipCard(el,c);
    grid.appendChild(el);
  });
}
function flipCard(el,c){
  if(memLock||el.classList.contains("flipped")||el.classList.contains("matched"))return;
  el.classList.add("flipped"); el.textContent=c.d;
  memFlipped.push({el,c});
  if(memFlipped.length===2){
    memLock=true;
    const[a,b]=memFlipped;
    if(a.c.k===b.c.k){
      setTimeout(()=>{
        a.el.classList.add("matched");b.el.classList.add("matched");
        memMatched++; sfx(true);
        document.getElementById("feedback").textContent="¡Bien! 🎉";
        memFlipped=[];memLock=false;
        if(memMatched===6) finishMission("memory",3,40,20);
      },500);
    }else{
      sfx(false);
      setTimeout(()=>{
        a.el.classList.remove("flipped");b.el.classList.remove("flipped");
        a.el.textContent="?";b.el.textContent="?";
        memFlipped=[];memLock=false;
      },900);
    }
  }
}

/* ---------- 3. QUIZ ---------- */
let quizIdx=0,quizScore=0,quizQs=[];
function gameQuiz(){
  quizQs=shuffle([...currentWorld.vocab]).slice(0,5).map(v=>{
    const wrong=shuffle(currentWorld.vocab.filter(x=>x.en!==v.en)).slice(0,3).map(x=>x.es);
    return {emoji:v.emoji,en:v.en,a:v.es,opts:shuffle([v.es,...wrong])};
  });
  quizIdx=0;quizScore=0; showQuizQ();
}
function showQuizQ(){
  const q=quizQs[quizIdx];
  const box=document.getElementById("gameBox");
  box.innerHTML=`
    <div class="health-bar">Pregunta ${quizIdx+1}/${quizQs.length}</div>
    <div class="emoji-big">${q.emoji}</div>
    <div class="question">What is "${q.en}" in Spanish?</div>
    <div id="feedback"></div>
    <div class="options" id="opts"></div>`;
  const o=document.getElementById("opts");
  q.opts.forEach(opt=>{
    const b=document.createElement("button");
    b.className="option";b.textContent=opt;
    b.onclick=()=>answerQuiz(b,opt,q.a);
    o.appendChild(b);
  });
  speak(q.en);
}
function answerQuiz(btn,sel,ans){
  document.querySelectorAll("#opts .option").forEach(b=>b.disabled=true);
  if(sel===ans){
    btn.classList.add("correct");quizScore++;state.totalCorrect++;sfx(true);
    document.getElementById("feedback").innerHTML="✅ ¡Correcto!";
  }else{
    btn.classList.add("wrong");state.totalWrong++;sfx(false);
    document.querySelectorAll("#opts .option").forEach(b=>{if(b.textContent===ans)b.classList.add("correct");});
    document.getElementById("feedback").innerHTML=`❌ La respuesta era: <b>${ans}</b>`;
  }
  setTimeout(()=>{
    quizIdx++;
    if(quizIdx>=quizQs.length){
      const stars=quizScore>=5?3:quizScore>=3?2:1;
      finishMission("quiz",stars,quizScore*10,quizScore*5);
    }else showQuizQ();
  },1300);
}

/* ---------- 4. SPEAK ---------- */
let speakIdx=0;
function gameSpeak(){ speakIdx=0; showSpeakCard(); }
function showSpeakCard(){
  const v=currentWorld.vocab[speakIdx];
  const box=document.getElementById("gameBox");
  box.innerHTML=`
    <div class="emoji-big">${v.emoji}</div>
    <div class="question">Repite: "${v.en}"</div>
    <div id="feedback">Toca 🔊 para escuchar, luego 🎤 para repetir</div>
    <div style="text-align:center">
      <button class="speak-btn" onclick="speak('${v.en}')">🔊</button>
      <button class="speak-btn" onclick="listen('${v.en}')" style="background:var(--danger);box-shadow:0 6px 0 #b71c1c">🎤</button>
    </div>
    <p style="text-align:center;color:#999">${speakIdx+1}/${currentWorld.vocab.length}</p>
    <button class="btn btn-success btn-block" onclick="nextSpeak()">Continuar ➡️</button>`;
  speak(v.en);
}
function nextSpeak(){
  speakIdx++;
  if(speakIdx>=currentWorld.vocab.length) finishMission("speak",3,35,18);
  else showSpeakCard();
}
function listen(word){
  const fb=document.getElementById("feedback");
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ fb.innerHTML="🎙️ ¡Inténtalo en voz alta! (Tu navegador no graba)"; sfx(true); return; }
  const r=new SR(); r.lang="en-US";
  fb.innerHTML="🎙️ Escuchando...";
  r.onresult=e=>{
    const said=e.results[0][0].transcript.toLowerCase();
    if(said.includes(word.toLowerCase())){ fb.innerHTML="✅ ¡Perfecto! 🌟";sfx(true);state.totalCorrect++; }
    else { fb.innerHTML=`👂 Dijiste "${said}". ¡Intenta otra vez!`;sfx(false); }
  };
  r.onerror=()=>fb.innerHTML="🎙️ ¡Sigue practicando!";
  r.start();
}

/* ---------- 5. GRAMMAR ---------- */

function gameGrammar(){
  gQs=shuffle([...currentWorld.grammar]);

}

/* ---------- 6. BOSS ---------- */
let bossHP,bossQs,bossIdx,heroHP;
function gameBoss(){
  bossHP=100; heroHP=3; bossIdx=0;
  const vq=currentWorld.vocab.map(v=>({q:`What is "${v.en}"?`,a:v.es,
    opts:shuffle([v.es,...shuffle(currentWorld.vocab.filter(x=>x.en!==v.en)).slice(0,2).map(x=>x.es)])}));
  const gq=currentWorld.grammar.map(g=>({q:g.q,a:g.a,opts:g.opts}));
  bossQs=shuffle([...vq,...gq]).slice(0,6);
  renderBoss();
}
function renderBoss(){
  if(bossIdx>=bossQs.length||bossHP<=0){ return bossWin(); }
  if(heroHP<=0){ return bossLose(); }
  const q=bossQs[bossIdx];
  const box=document.getElementById("gameBox");
  box.innerHTML=`
    <div class="battle-scene">
      <div class="fighter">
        <div class="char">${state.avatar}</div>
        <div class="health-bar">${"❤️".repeat(heroHP)}${"🖤".repeat(3-heroHP)}</div>
      </div>
      <div style="font-size:2rem">⚔️</div>
      <div class="fighter">
        <div class="char">👹</div>
        <div class="enemy-hp"><div class="enemy-hp-fill" style="width:${bossHP}%"></div></div>
      </div>
    </div>
    <div class="question">${q.q}</div>
    <div id="feedback"></div>
    <div class="options" id="opts"></div>`;
  const o=document.getElementById("opts");
  shuffle([...q.opts]).forEach(opt=>{
    const b=document.createElement("button");
    b.className="option";b.textContent=opt;
    b.onclick=()=>answerBoss(b,opt,q.a);
    o.appendChild(b);
  });
}
function answerBoss(btn,sel,ans){
  document.querySelectorAll("#opts .option").forEach(b=>b.disabled=true);
  if(sel===ans){
    btn.classList.add("correct");bossHP-=Math.ceil(100/bossQs.length);state.totalCorrect++;sfx(true);
    document.getElementById("feedback").innerHTML="⚔️ ¡Golpe certero!";
  }else{
    btn.classList.add("wrong");heroHP--;state.totalWrong++;sfx(false);
    document.querySelectorAll("#opts .option").forEach(b=>{if(b.textContent===ans)b.classList.add("correct");});
    document.getElementById("feedback").innerHTML=`💥 ¡El jefe te golpeó! Era: <b>${ans}</b>`;
  }
  setTimeout(()=>{ bossIdx++; renderBoss(); },1300);
}
function bossWin(){
  const stars=heroHP===3?3:heroHP===2?2:1;
  finishMission("boss",stars,80,40,true);
}
function bossLose(){
  document.getElementById("gameBox").innerHTML=`
    <div class="emoji-big">😵</div>
    <div class="question">¡El jefe te venció!</div>
    <p style="text-align:center">No te rindas, héroe. ¡Repasa y vuelve a intentarlo!</p>
    <button class="btn btn-primary btn-block" onclick="gameBoss()">🔄 Reintentar</button>
    <button class="btn btn-block" onclick="quitGame()">⬅️ Salir</button>`;
  sfx(false);
}

/* ===================== FIN DE MISIÓN ===================== */
function finishMission(type,stars,xp,coins,isBoss){
  if(!state.progress[currentWorld.id]) state.progress[currentWorld.id]={};
  const prev=state.progress[currentWorld.id][type]||0;
  state.progress[currentWorld.id][type]=Math.max(prev,stars);
  if(prev===0){ state.xp+=xp; state.coins+=coins; } // recompensa solo primera vez completa
  else { state.xp+=Math.floor(xp/3); state.coins+=Math.floor(coins/3); }

  // subir nivel cada 100 XP
  const newLevel=Math.floor(state.xp/100)+1;
  let leveledUp=newLevel>state.level;
  state.level=newLevel;

  checkBadges();
  if(isBoss && !state.masteredTopics.includes(currentWorld.theme))
    state.masteredTopics.push(currentWorld.theme);
  save(); confetti();

  const box=document.getElementById("modalBox");
  box.innerHTML=`
    <div class="big-emoji">${stars===3?"🏆":"🎉"}</div>
    <h2 style="color:var(--primary);text-shadow:none">¡Misión Completada!</h2>
    <div style="font-size:2rem">${"⭐".repeat(stars)}${"☆".repeat(3-stars)}</div>
    <div class="reward-line">+${prev===0?xp:Math.floor(xp/3)} XP ⚡</div>
    <div class="reward-line">+${prev===0?coins:Math.floor(coins/3)} Monedas 🪙</div>
    ${leveledUp?`<div class="reward-line">🆙 ¡Subiste al Nivel ${state.level}!</div>`:""}
    ${isBoss?`<div class="reward-line">🌍 ¡Nuevo mundo desbloqueado!</div>`:""}
    <button class="btn btn-success btn-block" onclick="closeModal();quitGame()">¡Continuar! ✅</button>`;
  document.getElementById("modal").classList.add("active");
}

/* ===================== BADGES ===================== */
const ALL_BADGES=[
  {id:"first",emoji:"🥇",name:"Primera Misión",check:s=>s.totalCorrect>=1},
  {id:"streak3",emoji:"🔥",name:"3 días seguidos",check:s=>s.streak>=3},
  {id:"lvl5",emoji:"⭐",name:"Nivel 5",check:s=>s.level>=5},
  {id:"coins100",emoji:"💰",name:"100 Monedas",check:s=>s.coins>=100},
  {id:"correct50",emoji:"🎯",name:"50 Aciertos",check:s=>s.totalCorrect>=50},
  {id:"boss1",emoji:"⚔️",name:"Caza-Jefes",check:s=>Object.values(s.progress).some(p=>p.boss)},
  {id:"world2",emoji:"🌍",name:"Explorador",check:s=>Object.keys(s.progress).length>=2},
  {id:"master",emoji:"👑",name:"Maestro del Inglés",check:s=>s.masteredTopics.length>=GAME_DATA.worlds.length}
];
function checkBadges(){
  ALL_BADGES.forEach(b=>{
    if(!state.badges.includes(b.id)&&b.check(state)){
      state.badges.push(b.id);
      setTimeout(()=>toast(`🏅 ¡Nueva insignia: ${b.name}!`),800);
    }
  });
}

/* ===================== DASHBOARD ===================== */

      <div class="stat-card"><div class="num">${state.xp}</div><div class="label">XP Total</div></div>
      <div class="stat-card"><div class="num">${state.coins}</div><div class="label">Monedas</div></div>
      <div class="stat-card"><div class="num">${state.streak}🔥</div><div class="label">Racha</div></div>

      <div class="stat-card"><div class="num">${acc}%</div><div class="label">Precisión</div></div>
      <div class="stat-card"><div class="num">${mins}min</div><div class="label">Tiempo</div></div>
      <div class="stat-card"><div class="num">${state.masteredTopics.length}</div><div class="label">Temas Dominados</div></div>

    <div class="stat-card" style="text-align:left">
      <b>✅ Temas Dominados:</b> ${state.masteredTopics.join(", ")||"Aún ninguno"}<br><br>

    <button class="btn btn-block" onclick="resetGame()" style="background:#ff7675;color:#fff">🔄 Reiniciar Progreso</button>`;
}
function resetGame(){
  if(confirm("¿Seguro que quieres borrar todo tu progreso?")){
    localStorage.removeItem("ehq_save");
    state=defaultState();
    showScreen("screen-welcome");
  }
}

/* ===================== UTILIDADES ===================== */
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function closeModal(){document.getElementById("modal").classList.remove("active");}
function speak(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=.85; u.pitch=1.1;
  speechSynthesis.speak(u);
}
/* Sonidos sintéticos */
let actx;
function sfx(ok){
  try{
    actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    if(ok){o.frequency.setValueAtTime(523,actx.currentTime);o.frequency.setValueAtTime(784,actx.currentTime+.1);}
    else{o.frequency.setValueAtTime(300,actx.currentTime);o.frequency.setValueAtTime(180,actx.currentTime+.1);}
    g.gain.setValueAtTime(.2,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.01,actx.currentTime+.3);
    o.start();o.stop(actx.currentTime+.3);
  }catch(e){}
}
function confetti(){
  const colors=["#fdcb6e","#6c5ce7","#00cec9","#fd79a8","#00b894"];
  for(let i=0;i<40;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1+Math.random()*2)+"s";
    c.style.borderRadius=Math.random()>.5?"50%":"0";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}
function toast(msg){
  const t=document.createElement("div");
  t.textContent=msg;
  t.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2d3436;color:#fff;padding:14px 22px;border-radius:50px;z-index:300;font-weight:bold;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:pop .4s;";
  document.body.appendChild(t);
  setTimeout(()=>{t.style.transition=".5s";t.style.opacity="0";setTimeout(()=>t.remove(),500);},2500);
}

if(state.name){ /* usuario existente, mantiene welcome screen visible */ }
